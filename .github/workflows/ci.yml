name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: ./gradlew shadowJar

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: smali-lsp-all
          path: build/libs/smali-lsp-*-all.jar
          archive: false

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Unit tests
        run: ./gradlew test --tests "*.unit.*"

      - name: Integration tests (synthetic only)
        run: ./gradlew test --tests "*.integration.lsp.*" --tests "*.integration.navigation.*" --tests "*.integration.workspace.*"

      - name: Regression tests
        run: ./gradlew test --tests "*.regression.*"

      - name: Build JAR (required for daemon tests)
        run: ./gradlew shadowJar

      - name: CLI and daemon tests
        run: ./gradlew test --tests "*.cli.*"

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit
