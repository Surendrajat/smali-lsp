# Redirect Java Util Logging (JUL) to file
# LSP4J uses JUL internally

# Console handler disabled to avoid stdout contamination
handlers=java.util.logging.FileHandler

# Log to file in current directory
java.util.logging.FileHandler.pattern=smali-lsp-jul.log
java.util.logging.FileHandler.limit=1000000
java.util.logging.FileHandler.count=1
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.FileHandler.append=true

# Set default log level
.level=WARNING

# Silence LSP4J noise
org.eclipse.lsp4j.level=SEVERE
